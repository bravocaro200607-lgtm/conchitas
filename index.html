<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Conchitas</title>
<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f4f4;
}
nav{
    background:#ff9800;
    padding:10px;
}
nav button{
    margin:5px;
    padding:10px;
}
section{
    display:none;
    padding:20px;
}
.active{
    display:block;
}
input, select, button{
    padding:8px;
    margin:5px;
}
table{
    border-collapse:collapse;
    width:100%;
}
td, th{
    border:1px solid #ccc;
    padding:8px;
}
</style>
</head>
<body>

<nav>
<button onclick="mostrar('pedido')">Registrar pedido</button>
<button onclick="mostrar('verPedidos')">Ver pedidos</button>
<button onclick="mostrar('inventario')">Inventario</button>
<button onclick="mostrar('finanzas')">Finanzas</button>
</nav>

<section id="pedido" class="active">
<h2>Nuevo pedido</h2>

<input id="cliente" placeholder="Cliente">
<input id="telefono" placeholder="Teléfono">
<input id="fecha" type="date"> <select id="producto">
<option value="7">Concha individual ($7)</option>
<option value="35">Charola 5 ($35)</option>
</select>

<input id="cantidad" type="number" placeholder="Cantidad">

<button onclick="guardarPedido()">Guardar</button>

<p id="total"></p>
</section>

<section id="verPedidos">
<h2>Pedidos</h2>
<table>
<thead>
<tr>
<th>Entrega</th> <th>Cliente</th>
<th>Producto</th>
<th>Cantidad</th>
<th>Total</th>
</tr>
</thead>
<tbody id="listaPedidos"></tbody>
</table>
</section>

<section id="inventario">
<h2>Inventario</h2>

<input id="prodNombre" placeholder="Producto">
<input id="prodCant" type="number" placeholder="Cantidad">

<button onclick="agregarInventario()">Agregar</button>

<ul id="listaInventario"></ul>

</section>

<section id="finanzas">
<h2>Finanzas</h2>

<input id="monto" type="number" placeholder="Cantidad">

<select id="tipo">
<option>Ganancia</option>
<option>Inversion</option>
</select>

<button onclick="agregarMovimiento()">Guardar</button>

<p id="balance"></p>

</section>

<script>

let pedidos = JSON.parse(localStorage.getItem("pedidos")) || []
let inventario = JSON.parse(localStorage.getItem("inventario")) || []
let movimientos = JSON.parse(localStorage.getItem("movimientos")) || []

function mostrar(id){

document.querySelectorAll("section").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(id).classList.add("active")

actualizar()

}

function guardarPedido(){

let cliente = document.getElementById("cliente").value
let fecha = document.getElementById("fecha").value // Captura de fecha
let precio = document.getElementById("producto").value
let cantidad = document.getElementById("cantidad").value

let total = precio * cantidad

pedidos.push({
cliente,
fecha, // Guardado de fecha
precio,
cantidad,
total
})

localStorage.setItem("pedidos",JSON.stringify(pedidos))

alert("Guardado")

actualizar()

}

function actualizar(){

let tabla=""

pedidos.forEach(p=>{
tabla+=`
<tr>
<td>${p.fecha || ''}</td> <td>${p.cliente}</td>
<td>$${p.precio}</td>
<td>${p.cantidad}</td>
<td>$${p.total}</td>
</tr>
`
})

document.getElementById("listaPedidos").innerHTML=tabla


let inv=""

inventario.forEach(i=>{
inv+=`<li>${i.nombre} : ${i.cantidad}</li>`
})

document.getElementById("listaInventario").innerHTML=inv


let balance=0

movimientos.forEach(m=>{
if(m.tipo=="Ganancia") balance+=m.monto
else balance-=m.monto
})

document.getElementById("balance").innerText="Dinero actual: $"+balance

}

function agregarInventario(){

let nombre=document.getElementById("prodNombre").value
let cantidad=document.getElementById("prodCant").value

inventario.push({
nombre,
cantidad
})

localStorage.setItem("inventario",JSON.stringify(inventario))

actualizar()

}

function agregarMovimiento(){

let monto=parseFloat(document.getElementById("monto").value)
let tipo=document.getElementById("tipo").value

movimientos.push({
monto,
tipo
})

localStorage.setItem("movimientos",JSON.stringify(movimientos))

actualizar()

}

actualizar()

</script>

</body>
</html>
